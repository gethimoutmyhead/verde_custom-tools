<!DOCTYPE html>
<html lang="en">	
	<head>
		<meta charset='utf-8'>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="robots" content="noindex, nofollow" />


		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
		<title>CannCulator 2.0 </title>
	</head>
	<header>
	</header>

	<body>
		<div class="container">
			<div class="row my-2 border border-primary rounded">
				<div class="col-12 col-md-8 py-2">
					<div class="text-center">CANNCULATOR</div>
				</div>
				<div class="col-12 col-md-4">
					<div class="text-end">
						Version 2.0
						<br>
						by Shashi Ponraja
					</div>
				</div>
			</div>

			<form class='row my-3 border border-primary rounded'>
				<div class='form-floating col-12 col-md-6 my-1'>
					<input id="productName2" class="form-control" type="text" placeholder="fasf" >
					<label for="productName2">Product Name</label>
				</div>
				<div class='col-12 col-md-4 my-1'>
					<p>Product details here</p>
				</div>
				<div class="col-12 col-md-2">
					<div class="d-grid d-md-flex justify-content-md-end py-2">
						<button class="btn btn-primary" type="button">
							+
						</button>
					</div>
				</div>
			</form>
			<div class='row border border-primary rounded'>
				<div class='col-12 border-bottom border-primary'>
					<h3 class=' text-center text-md-start my-1'> Dry herb </h3>
				</div>
				<div class='col-12'>
					<div class='row d-none d-xl-flex align-items-center'>
						<div class='col-6'>
							Product Name
						</div>
						<div class='col-xl-1'>
							strength (% w/w)
						</div>
						<div class='col-xl-1'>
							weight (g)
						</div>
						<div class='col-xl-1'>
							Units (#)
						</div>
						<div class='col-xl-1'>
							Repeats (#)
						</div>
						<div class='col-xl-1'>
							THC content (mg)
						</div>
					</div>
					<form class='row my-3 border border-primary rounded d-flex' id='dryherb-01'>
						<div class='form-floating col-12 col-md-6 my-1'>
							<input id="dryherb-01_name" class="form-control" type="text" placeholder="dryherb-01_name" >
							<label for="dryherb-01_name">Dry herb product name</label>
						</div>
						<div class='form-floating col-6 col-md-3 col-xl-1 my-1'>
							<input id="dryherb-01_strength" class="form-control" type="text" placeholder="dryherb-01_strength" >
							<label for="dryherb-01_strength" class='d-xl-none'>strength (% w/w)</label>
						</div>
						<div class='form-floating col-6 col-md-3 col-xl-1 my-1'>
							<input id="dryherb-01_weight" class="form-control" type="text" placeholder="dryherb-01_weight" >
							<label for="dryherb-01_weight" class='d-xl-none'>Weight(g)</label>
						</div>
						<div class='form-floating col-6 col-md-3 col-xl-1 my-1'>
							<input id="dryherb-01_units" class="form-control" type="text" placeholder="dryherb-01_units" >
							<label for="dryherb-01_units" class='d-xl-none'>Units (#)</label>
						</div>
						<div class='form-floating col-6 col-md-3 col-xl-1 my-1'>
							<input id="dryherb-01_repeats" class="form-control" type="text" placeholder="dryherb-01_repeats" >
							<label for="dryherb-01_repeats" class='d-xl-none'>Repeats (#)</label>
						</div>
						<div class='col-12 col-md-6 col-xl-1 mt-3'>
							<div class='row align-items-center'>
								<div class='col-6 d-xl-none'>THC content(mg): </div>
								<div class='col-6 col-xl-12'>50mg</div>
							</div>
						</div>
						<div class="col-12 col-xl-1">
							<div class="d-grid d-md-flex justify-content-md-end py-2">
								<button class="btn btn-primary" type="button">
									+
								</button>
							</div>
						</div>
					</form>
					<table class='table row d-grid'>
						<thead>
							<tr>
								<th scope='col'>% strength</th>
								<th scope='col'>Weight per pack (g)</th>
								<th scope='col'># of packs</th>
								<th scope='col'>Repeats</th>
								<th scope='col'>THC in script (mg)</th>
							</tr>
							<tr>
								<td class='col-2' scope='col'><input type="text"></td>
								<td scope='col'><input type="text"></td>
								<td scope='col'><input type="text"></td>
								<td scope='col'><input type="text"></td>
								<td scope='col'><input type="text">	</td>
							</tr>
						</thead>
					</table>
				</div>
			</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

	</body>

	<footer>

	</footer>
</html>
